<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1324" />
      <stop offset="100%" stop-color="#050710" />
    </radialGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#FFA62B" />
      <stop offset="100%" stop-color="#F8FAFC" />
    </linearGradient>

    <!-- Inner Glow Gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#3B82F6" stop-opacity="0" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.25" />
    </radialGradient>

    <!-- Symbol Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Hexagon Outer Shape with Shadow -->
  <g filter="url(#shadow)">
    <!-- Glowing Hexagon Border -->
    <polygon points="64,6 114,35 114,93 64,122 14,93 14,35" fill="url(#borderGrad)" />
    
    <!-- Dark Inner Hexagon Background -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#bgGrad)" />

    <!-- Inner Hexagon Glow overlay -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#innerGlow)" />
  </g>

  <!-- Glowing Central Symbol -->
  <g filter="url(#glow)">
    
        <!-- Radiant golden halo eye -->
        <g stroke="#F8FAFC" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="64" cy="64" r="28" stroke="#3B82F6" stroke-dasharray="6,4" />
          <path d="M30,64 C44,48 84,48 98,64 C84,80 44,80 30,64 Z" fill="#FFA62B" fill-opacity="0.15" stroke-width="4.5" />
          <circle cx="64" cy="64" r="10" stroke="#F8FAFC" stroke-width="3" />
          <circle cx="64" cy="64" r="4" fill="#fff" />
        </g>
      
  </g>

  <!-- Small geometric accent details -->
  <circle cx="64" cy="22" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="34" cy="98" r="1" fill="#F8FAFC" opacity="0.4" />
  <circle cx="94" cy="98" r="1" fill="#3B82F6" opacity="0.4" />
</svg>
