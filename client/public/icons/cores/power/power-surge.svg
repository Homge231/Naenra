<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#20080c" />
      <stop offset="100%" stop-color="#0e0305" />
    </radialGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E63946" />
      <stop offset="50%" stop-color="#FF7B00" />
      <stop offset="100%" stop-color="#FFA62B" />
    </linearGradient>

    <!-- Inner Glow Gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#E63946" stop-opacity="0" />
      <stop offset="100%" stop-color="#E63946" stop-opacity="0.25" />
    </radialGradient>

    <!-- Symbol Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Hexagon Outer Shape with Shadow -->
  <g filter="url(#shadow)">
    <!-- Glowing Hexagon Border -->
    <polygon points="64,6 114,35 114,93 64,122 14,93 14,35" fill="url(#borderGrad)" />
    
    <!-- Dark Inner Hexagon Background -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#bgGrad)" />

    <!-- Inner Hexagon Glow overlay -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#innerGlow)" />
  </g>

  <!-- Glowing Central Symbol -->
  <g filter="url(#glow)">
    
        <!-- High voltage electrical waves -->
        <g stroke="#E63946" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- Power pylons/lines -->
          <line x1="20" y1="88" x2="108" y2="88" stroke-width="3" />
          <line x1="34" y1="88" x2="34" y2="52" stroke-width="3.5" />
          <line x1="94" y1="88" x2="94" y2="52" stroke-width="3.5" />
          <!-- Heavy voltage surge line -->
          <path d="M20,52 Q34,24 50,56 T80,36 T108,52" stroke="#FFA62B" stroke-width="6.5" />
        </g>
      
  </g>

  <!-- Small geometric accent details -->
  <circle cx="64" cy="22" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="34" cy="98" r="1" fill="#FFA62B" opacity="0.4" />
  <circle cx="94" cy="98" r="1" fill="#E63946" opacity="0.4" />
</svg>
