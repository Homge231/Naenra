<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1624" />
      <stop offset="100%" stop-color="#050a12" />
    </radialGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#FFA62B" />
    </linearGradient>

    <!-- Inner Glow Gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#60A5FA" stop-opacity="0" />
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.25" />
    </radialGradient>

    <!-- Symbol Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Hexagon Outer Shape with Shadow -->
  <g filter="url(#shadow)">
    <!-- Glowing Hexagon Border -->
    <polygon points="64,6 114,35 114,93 64,122 14,93 14,35" fill="url(#borderGrad)" />
    
    <!-- Dark Inner Hexagon Background -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#bgGrad)" />

    <!-- Inner Hexagon Glow overlay -->
    <polygon points="64,9 111,36 111,92 64,119 17,92 17,36" fill="url(#innerGlow)" />
  </g>

  <!-- Glowing Central Symbol -->
  <g filter="url(#glow)">
    
        <!-- Checkered speed flags -->
        <g stroke="#60A5FA" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="36" y1="92" x2="56" y2="32" stroke-width="5" />
          <!-- Flag 1 -->
          <path d="M56,32 Q72,24 84,36 Q96,48 108,40 L98,72 Q86,80 74,68 Q62,56 46,62 Z" fill="#3B82F6" fill-opacity="0.2" />
          <!-- Checkered pattern cuts -->
          <line x1="72" y1="36" x2="62" y2="64" stroke="#FFA62B" stroke-width="2" />
          <line x1="88" y1="42" x2="78" y2="70" stroke="#FFA62B" stroke-width="2" />
        </g>
      
  </g>

  <!-- Small geometric accent details -->
  <circle cx="64" cy="22" r="1.5" fill="#fff" opacity="0.8" />
  <circle cx="34" cy="98" r="1" fill="#FFA62B" opacity="0.4" />
  <circle cx="94" cy="98" r="1" fill="#60A5FA" opacity="0.4" />
</svg>
